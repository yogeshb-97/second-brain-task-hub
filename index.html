<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Second Brain"/>
<title>Second Brain</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-180.png"/>
<script>
(function(){
  var t=localStorage.getItem('sb_theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg:       #f8f9ff;
  --card:     #ffffff;
  --card-alt: #eff4ff;
  --border:   #e5eeff;
  --text:     #0b1c30;
  --muted:    #464555;
  --faint:    #777587;
  --input-bg: #eff4ff;
  --nav-bg:   rgba(255,255,255,0.95);
}
[data-theme="dark"] {
  --bg:       #1c2030;
  --card:     #272c42;
  --card-alt: #313752;
  --border:   #3e4561;
  --text:     #f1f2f8;
  --muted:    #c5c9dc;
  --faint:    #9098b3;
  --input-bg: #313752;
  --nav-bg:   rgba(39,44,66,0.95);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Geist',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  transition:background 0.2s,color 0.2s;
}
.material-symbols-outlined{
  font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
  vertical-align:middle;
}
.filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}

#app-header{
  position:sticky;top:0;z-index:50;
  background:var(--card);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.header-inner{max-width:900px;margin:0 auto;padding:12px 16px 0;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo{display:flex;align-items:center;gap:6px;font-size:18px;font-weight:700;color:#3525cd;letter-spacing:-0.3px;}
.header-actions{display:flex;align-items:center;gap:8px;}
.icon-btn{
  width:36px;height:36px;border-radius:10px;
  border:1px solid var(--border);background:var(--card-alt);
  color:var(--text);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.15s;
}
.icon-btn:hover{background:var(--border);}
.add-btn{
  display:flex;align-items:center;gap:4px;
  padding:0 14px;height:36px;border-radius:10px;
  border:none;background:#3525cd;color:#fff;
  font-family:inherit;font-size:13px;font-weight:600;
  cursor:pointer;transition:background 0.15s;
}
.add-btn:hover{background:#2a1db0;}

.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;padding-bottom:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  display:flex;align-items:center;gap:5px;
  padding:6px 14px;
  font-size:13px;font-weight:500;
  color:var(--muted);
  border-radius:8px 8px 0 0;
  cursor:pointer;white-space:nowrap;
  transition:color 0.15s,background 0.15s;
  margin-bottom:0;
}
.tab.active{background:#3525cd;color:#fff;}
.tab:hover:not(.active){color:var(--text);}

#main{max-width:900px;margin:0 auto;padding:20px 16px 90px;}
@media(min-width:1024px){#main{padding-bottom:40px;}}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;text-align:center;
}
.stat-val{font-size:22px;font-weight:700;color:#3525cd;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}

.task-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;
  cursor:pointer;transition:border-color 0.15s;
}
.task-item:hover{border-color:var(--muted);}
.task-item.done-item{opacity:0.6;}
.task-row{display:flex;align-items:flex-start;gap:10px;}
.task-check{
  width:20px;height:20px;border-radius:6px;
  border:2px solid var(--border);flex-shrink:0;margin-top:1px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,border-color 0.15s;
}
.task-check.checked{background:#3525cd;border-color:#3525cd;}
.task-check.inprog{background:#684000;border-color:#684000;}
.task-meta{flex:1;min-width:0;}
.task-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:6px;line-height:1.4;}
.task-title.done-txt{text-decoration:line-through;color:var(--muted);}
.task-badges{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.badge{
  font-size:11px;font-weight:600;border-radius:6px;
  padding:2px 8px;display:inline-flex;align-items:center;gap:4px;
}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.tag-badge{
  font-size:11px;font-weight:500;color:var(--muted);
  background:var(--card-alt);border-radius:6px;padding:2px 8px;
}
.xp-badge{font-size:11px;font-weight:600;color:#3525cd;}
.task-actions{
  display:flex;gap:5px;flex-shrink:0;
  align-items:flex-start;flex-wrap:wrap;
  opacity:0;transition:opacity 0.15s;
}
.task-item:hover .task-actions,
.task-item.touch-show .task-actions{opacity:1;}
@media(max-width:768px){.task-actions{opacity:1;}}
.act-btn{
  display:flex;align-items:center;gap:3px;
  padding:4px 9px;border-radius:8px;
  border:1px solid var(--border);background:var(--card-alt);
  color:var(--text);font-family:inherit;
  font-size:11px;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:background 0.12s;
}
.act-btn:hover{background:var(--border);}
.act-btn.primary{background:#3525cd;color:#fff;border-color:#3525cd;}
.act-btn.primary:hover{background:#2a1db0;}
.del-btn{
  width:28px;height:28px;border-radius:8px;
  border:1px solid var(--border);background:var(--card-alt);
  color:var(--muted);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.12s,color 0.12s;
}
.del-btn:hover{background:#fff0f0;color:#ba1a1a;border-color:#ffc9c9;}
[data-theme="dark"] .del-btn:hover{background:#2a1010;border-color:#4a1515;}

.section-label{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.08em;color:var(--muted);margin:18px 0 8px;
}

.info-banner{
  display:flex;align-items:center;gap:8px;
  background:var(--card-alt);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;
  font-size:13px;color:var(--muted);margin-bottom:16px;
}

.search-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.search-input{
  flex:1;min-width:160px;padding:8px 12px;
  border-radius:10px;border:1px solid var(--border);
  background:var(--input-bg);color:var(--text);
  font-family:inherit;font-size:16px;outline:none;
}
.search-input:focus{border-color:#3525cd;}
.filter-select{
  padding:8px 10px;border-radius:10px;
  border:1px solid var(--border);background:var(--input-bg);
  color:var(--text);font-family:inherit;font-size:16px;outline:none;cursor:pointer;
}
.filter-select:focus{border-color:#3525cd;}
.pills-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.pill{
  font-size:12px;font-weight:600;border-radius:20px;
  padding:3px 12px;border:1px solid var(--border);
  background:var(--card-alt);color:var(--muted);
  cursor:pointer;transition:background 0.12s;
}
.pill.active-pill{background:#3525cd;color:#fff;border-color:#3525cd;}

.habit-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;
}
.habit-ring-wrap{position:relative;width:52px;height:52px;flex-shrink:0;}
.habit-ring-wrap svg{transform:rotate(-90deg);}
.habit-ring-inner{
  position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
}
.habit-info{flex:1;}
.habit-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;}
.habit-streak{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.streak-dots{display:flex;gap:3px;}
.s-dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
.s-dot.hit{background:#3525cd;}
.habit-pct{font-size:13px;font-weight:700;text-align:right;}

.heatmap-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;padding:16px;margin-top:16px;
}
.heatmap-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-top:10px;}
.h-cell{aspect-ratio:1;border-radius:3px;background:var(--border);}
.h-cell.l1{background:#c4bbff;}
.h-cell.l2{background:#8b7ef0;}
.h-cell.l3{background:#5b48e8;}
.h-cell.l4{background:#3525cd;}
[data-theme="dark"] .h-cell.l1{background:#2d2560;}
[data-theme="dark"] .h-cell.l2{background:#3d31a0;}
[data-theme="dark"] .h-cell.l3{background:#4e3dc0;}
[data-theme="dark"] .h-cell.l4{background:#6351e8;}

.kanban-filter{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.kanban-board{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;align-items:start;
}
@media(max-width:640px){
  .kanban-board{
    display:flex;flex-direction:column;
    gap:14px;padding-bottom:4px;
  }
  .kanban-col{width:100%;}
  .kanban-task{touch-action:auto;cursor:default;}
}
.kanban-col{
  background:var(--card-alt);border:1px solid var(--border);
  border-radius:14px;padding:12px;min-height:80px;
}
.kanban-col-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
}
.kanban-col-title{font-size:13px;font-weight:700;color:var(--text);}
.kanban-count{font-size:11px;font-weight:700;border-radius:20px;padding:2px 9px;}
.kanban-task{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;margin-bottom:7px;
  cursor:grab;touch-action:none;user-select:none;
  transition:box-shadow 0.1s;
}
.kanban-task:active{cursor:grabbing;}
.kanban-task-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:7px;}
.kanban-badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.kanban-actions{display:flex;gap:5px;flex-wrap:wrap;}
.kanban-col.drag-over{outline:2px dashed #3525cd;outline-offset:-2px;}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:100;display:flex;align-items:center;justify-content:center;
  padding:16px;opacity:0;pointer-events:none;transition:opacity 0.2s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:18px;padding:20px;width:100%;max-width:420px;
  transform:translateY(20px);transition:transform 0.2s;
}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:16px;font-weight:700;color:var(--text);}
.modal-close{
  width:30px;height:30px;border-radius:8px;
  border:1px solid var(--border);background:var(--card-alt);
  color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.form-group{margin-bottom:12px;}
.form-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block;}
.form-input,.form-select{
  width:100%;padding:9px 12px;border-radius:10px;
  border:1px solid var(--border);background:var(--input-bg);
  color:var(--text);font-size:16px;font-family:inherit;
  outline:none;transition:border-color 0.15s;
}
.form-input:focus,.form-select:focus{border-color:#3525cd;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modal-footer{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.btn-cancel{
  padding:8px 16px;border-radius:10px;
  border:1px solid var(--border);background:var(--card-alt);
  color:var(--text);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
}
.btn-save{
  padding:8px 18px;border-radius:10px;border:none;
  background:#3525cd;color:#fff;
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
}
.btn-save:hover{background:#2a1db0;}

#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--nav-bg);
  border-top:1px solid var(--border);
  display:flex;
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  padding-bottom:env(safe-area-inset-bottom,8px);
  z-index:50;
}
@media(min-width:1024px){#bottom-nav{display:none;}}
.nav-item{
  flex:1 1 0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  cursor:pointer;padding:6px 4px;border-radius:10px;
  color:var(--muted);transition:color 0.15s,background 0.15s;
}
.nav-item.active{background:#e2dfff;color:#3525cd;}
.nav-item span.material-symbols-outlined{font-size:20px;}
.bnav-label{font-size:9px;font-weight:600;line-height:1;}
@media(max-width:360px){.bnav-label{display:none;}}

#toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#3525cd;color:#fff;
  font-size:13px;font-weight:600;
  padding:8px 18px;border-radius:20px;
  opacity:0;pointer-events:none;
  transition:opacity 0.2s,transform 0.2s;
  white-space:nowrap;z-index:200;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="app-header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">
        <span style="font-size:20px">⚡</span>
        <span>Second Brain</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">
          <span class="material-symbols-outlined" id="theme-icon" style="font-size:18px">light_mode</span>
        </button>
        <button class="add-btn" onclick="openModal()">
          <span class="material-symbols-outlined" style="font-size:16px">add</span>
          Add Task
        </button>
      </div>
    </div>
    <div class="tabs" id="tabs">
      <div class="tab active" onclick="switchTab('today',0)">
        <span class="material-symbols-outlined" style="font-size:15px">today</span> Today
      </div>
      <div class="tab" onclick="switchTab('pending',1)">
        <span class="material-symbols-outlined" style="font-size:15px">pending_actions</span> Pending
      </div>
      <div class="tab" onclick="switchTab('bucket',2)">
        <span class="material-symbols-outlined" style="font-size:15px">inventory_2</span> Bucket
      </div>
      <div class="tab" onclick="switchTab('habits',3)">
        <span class="material-symbols-outlined" style="font-size:15px">local_fire_department</span> Habits
      </div>
      <div class="tab" onclick="switchTab('kanban',4)">
        <span class="material-symbols-outlined" style="font-size:15px">view_kanban</span> Kanban
      </div>
    </div>
  </div>
</div>

<div id="main"></div>

<nav id="bottom-nav">
  <div class="nav-item active" id="nav-0" onclick="switchTab('today',0)">
    <span class="material-symbols-outlined">today</span>
    <span class="bnav-label">Today</span>
  </div>
  <div class="nav-item" id="nav-1" onclick="switchTab('pending',1)">
    <span class="material-symbols-outlined">pending_actions</span>
    <span class="bnav-label">Pending</span>
  </div>
  <div class="nav-item" id="nav-2" onclick="switchTab('bucket',2)">
    <span class="material-symbols-outlined">inventory_2</span>
    <span class="bnav-label">Bucket</span>
  </div>
  <div class="nav-item" id="nav-3" onclick="switchTab('habits',3)">
    <span class="material-symbols-outlined">local_fire_department</span>
    <span class="bnav-label">Habits</span>
  </div>
  <div class="nav-item" id="nav-4" onclick="switchTab('kanban',4)">
    <span class="material-symbols-outlined">view_kanban</span>
    <span class="bnav-label">Kanban</span>
  </div>
</nav>

<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add Task</span>
      <button class="modal-close" onclick="closeModal()">
        <span class="material-symbols-outlined" style="font-size:16px">close</span>
      </button>
    </div>
    <div class="form-group">
      <label class="form-label">Task Title</label>
      <input class="form-input" id="m-title" type="text" placeholder="What needs to be done?"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Add To</label>
        <select class="form-select" id="m-list">
          <option value="today">Today's Tasks</option>
          <option value="tomorrow">Tomorrow</option>
          <option value="pending">Pending</option>
          <option value="bucket">Bucket List</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tag</label>
        <input class="form-input" id="m-tag" type="text" placeholder="e.g. Work"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Due Date</label>
      <select class="form-select" id="m-due-quick" onchange="handleDueQuick()">
        <option value="">No due date</option>
        <option value="today">Today</option>
        <option value="tomorrow">Tomorrow</option>
        <option value="weekend">This weekend</option>
        <option value="nextweek">Next week</option>
        <option value="custom">Pick a date…</option>
      </select>
      <input class="form-input" id="m-due" type="date" style="display:none;margin-top:8px;"/>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Add Task</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const TODAY_ISO = new Date().toISOString().slice(0,10);
const STORE_KEY = 'sb_v4';

const SEED_TASKS = [

  {id:12,title:'Organise project folders',diff:'Easy',xp:80,tag:'Admin',list:'pending',status:'todo',dueDate:'',xpAwarded:false},
  {id:13,title:'Learn to play guitar',diff:'Easy',xp:80,tag:'Life',list:'bucket',status:'todo',dueDate:'',xpAwarded:false},
  {id:14,title:'Write a book',diff:'Hard',xp:500,tag:'Creative',list:'bucket',status:'todo',dueDate:'',xpAwarded:false},
  {id:15,title:'Visit Japan',diff:'Medium',xp:300,tag:'Travel',list:'bucket',status:'todo',dueDate:'',xpAwarded:false},
  {id:16,title:'Launch a side project',diff:'Hard',xp:450,tag:'Work',list:'bucket',status:'todo',dueDate:'',xpAwarded:false},
];
const SEED_HABITS = [
  {id:1,name:'Hydration',icon:'water_drop',color:'#3525cd',target:8,current:7,xp:25,done:false,unit:'glasses'},
  {id:2,name:'Reading',icon:'menu_book',color:'#684000',target:45,current:10,xp:50,done:false,unit:'mins'},

let state = {
  tasks:[],nextId:17,habits:[],
  profile:{xpTotal:3250,streak:12},
  currentTab:'today',lastOpenDate:''
};
let pendingSearch='';
let pendingFilter='All';
let kanbanFilter='all';
let promotedCount=0;

function load() {
  try {
    const v3raw = localStorage.getItem('sb_v3');
    if (v3raw && !localStorage.getItem(STORE_KEY)) {
      const v3 = JSON.parse(v3raw);
      const migrated = (v3.tasks||[]).map(t => ({
        id:t.id,title:t.title,diff:t.diff||'Medium',xp:t.xp||150,
        tag:t.tag||'General',
        list:t.today?'today':'pending',
        status:t.done?'done':'todo',
        dueDate:t.dueDate||'',
        xpAwarded:!!t.done,
      }));
      state.tasks = migrated;
      state.nextId = migrated.reduce((a,t)=>Math.max(a,t.id),0)+1;
      state.profile = v3.profile||state.profile;
      localStorage.setItem('sb_v3_backup', v3raw);
      localStorage.removeItem('sb_v3');
    } else {
      const s = localStorage.getItem(STORE_KEY);
      if (s) {
        const parsed = JSON.parse(s);
        state = {...state, ...parsed};
      } else {
        state.tasks = SEED_TASKS.map(t=>({...t}));
        state.habits = SEED_HABITS.map(h=>({...h}));
        state.nextId = 17;
        state.profile = {xpTotal:3250,streak:12};
      }
    }
  } catch(e) {
    state.tasks = SEED_TASKS.map(t=>({...t}));
    state.habits = SEED_HABITS.map(h=>({...h}));
  }
  if (!state.habits || !state.habits.length) state.habits = SEED_HABITS.map(h=>({...h}));

  if (state.lastOpenDate && state.lastOpenDate !== TODAY_ISO) {
    let n=0;
    state.tasks.forEach(t=>{if(t.list==='tomorrow'){t.list='today';n++;}});
    promotedCount=n;
  }
  state.lastOpenDate = TODAY_ISO;
  save();
}

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function diffStyle(diff) {
  if(diff==='Hard') return {bg:'#fff0f0',color:'#ba1a1a'};
  if(diff==='Medium') return {bg:'#fff8ee',color:'#684000'};
  return {bg:'#e8fdf4',color:'#006c49'};
}

function listBadgeStyle(list) {
  const m={today:{bg:'#e2dfff',color:'#3525cd'},tomorrow:{bg:'#e8f0ff',color:'#2d5be3'},pending:{bg:'#fff8ee',color:'#684000'},bucket:{bg:'#f0eeff',color:'#4b35cc'}};
  return m[list]||m.today;
}

function diffBadgeHTML(diff) {
  const s=diffStyle(diff);
  return `<span class="badge" style="background:${s.bg};color:${s.color}"><span class="dot" style="background:${s.color}"></span>${diff}</span>`;
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function toggleRowStatus(id) {
  const task=state.tasks.find(t=>t.id===id);
  if(!task) return;
  if(task.status==='done'){task.status='todo';}
  else{
    task.status='done';
    if(!task.xpAwarded){task.xpAwarded=true;state.profile.xpTotal+=task.xp;showToast(`+${task.xp} XP earned! ⚡`);}
  }
  save();reRender();
}

function setStatus(id,status,e) {
  if(e) e.stopPropagation();
  const task=state.tasks.find(t=>t.id===id);
  if(!task) return;
  task.status=status;
  if(status==='done'&&!task.xpAwarded){
    task.xpAwarded=true;state.profile.xpTotal+=task.xp;
    showToast(`+${task.xp} XP earned! ⚡`);
  }
  save();reRender();
}

function deleteTask(id,e) {
  if(e) e.stopPropagation();
  state.tasks=state.tasks.filter(t=>t.id!==id);
  save();reRender();
}

function moveTask(id,list,e) {
  if(e) e.stopPropagation();
  const task=state.tasks.find(t=>t.id===id);
  if(!task) return;
  task.list=list;
  if(list==='today'||list==='pending') task.status='todo';
  save();reRender();
}

function reRender(){renderTab(state.currentTab);}

function isoOffset(days){const d=new Date();d.setDate(d.getDate()+days);return d.toISOString().slice(0,10);}
function isoNextSaturday(){const d=new Date();const off=(6-d.getDay()+7)%7||7;d.setDate(d.getDate()+off);return d.toISOString().slice(0,10);}
function isoNextMonday(){const d=new Date();const off=(1-d.getDay()+7)%7||7;d.setDate(d.getDate()+off);return d.toISOString().slice(0,10);}

function handleDueQuick(){
  const q=document.getElementById('m-due-quick').value;
  const due=document.getElementById('m-due');
  if(q==='custom'){due.style.display='block';due.focus();return;}
  due.style.display='none';
  if(q==='today')         due.value=isoOffset(0);
  else if(q==='tomorrow') due.value=isoOffset(1);
  else if(q==='weekend')  due.value=isoNextSaturday();
  else if(q==='nextweek') due.value=isoNextMonday();
  else                    due.value='';
}

function openModal() {
  document.getElementById('m-title').value='';
  document.getElementById('m-tag').value='';
  document.getElementById('m-due').value='';
  document.getElementById('m-due').style.display='none';
  document.getElementById('m-due-quick').value='';
  const lm={today:'today',pending:'pending',bucket:'bucket',habits:'today',kanban:'today',tomorrow:'tomorrow'};
  document.getElementById('m-list').value=lm[state.currentTab]||'today';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-title').focus(),150);
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function saveTask() {
  const title=document.getElementById('m-title').value.trim();
  if(!title){document.getElementById('m-title').focus();return;}
  const list=document.getElementById('m-list').value;
  const tag=document.getElementById('m-tag').value.trim()||'General';
  const due=document.getElementById('m-due').value;
  const id=state.nextId++;
  state.tasks.push({id,title,diff:'Medium',xp:150,tag,list,status:'todo',dueDate:due,xpAwarded:false});
  save();closeModal();reRender();showToast('Task added!');
}

function toggleTheme() {
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  const next=isDark?'light':'dark';
  html.setAttribute('data-theme',next);
  document.getElementById('theme-icon').textContent=isDark?'dark_mode':'light_mode';
  localStorage.setItem('sb_theme',next);
}

function initThemeIcon() {
  const saved=document.documentElement.getAttribute('data-theme')||'dark';
  document.getElementById('theme-icon').textContent=saved==='dark'?'light_mode':'dark_mode';
}

function switchTab(tab,idx) {
  state.currentTab=tab;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.querySelectorAll('.nav-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  renderTab(tab);
}

function renderTab(tab) {
  const main=document.getElementById('main');
  if(tab==='today') main.innerHTML=renderToday();
  else if(tab==='pending') main.innerHTML=renderPending();
  else if(tab==='bucket') main.innerHTML=renderBucket();
  else if(tab==='habits') main.innerHTML=renderHabits();
  else if(tab==='kanban'){main.innerHTML=renderKanban();initKanbanDrag();}
}

function taskItemHTML(task,actionsHTML) {
  const isDone=task.status==='done';
  const isInProg=task.status==='inprogress';
  const checkClass=isDone?'checked':(isInProg?'inprog':'');
  const checkIcon=isDone
    ?`<span class="material-symbols-outlined filled" style="font-size:13px;color:#fff">check</span>`
    :(isInProg?`<span class="material-symbols-outlined" style="font-size:11px;color:#fff">play_arrow</span>`:'');
  const titleClass=isDone?'task-title done-txt':'task-title';
  const dueHTML=task.dueDate?`<span style="font-size:11px;color:var(--muted);margin-left:6px">📅 ${task.dueDate}</span>`:'';
  return `
<div class="task-item${isDone?' done-item':''}" onclick="toggleRowStatus(${task.id})">
  <div class="task-row">
    <div class="task-check ${checkClass}" onclick="setStatus(${task.id},'${isDone?'todo':'done'}',event)">${checkIcon}</div>
    <div class="task-meta">
      <div class="${titleClass}">${escHtml(task.title)}${dueHTML}</div>
      <div class="task-badges">
        ${diffBadgeHTML(task.diff)}
        ${task.tag?`<span class="tag-badge">${escHtml(task.tag)}</span>`:''}
        <span class="xp-badge">⚡${task.xp} XP</span>
      </div>
    </div>
    <div class="task-actions">${actionsHTML}</div>
  </div>
</div>`;
}

function setPendingFilter(f){pendingFilter=f;reRender();}

function renderPending() {
  const diffs=['All','Easy','Medium','Hard'];
  const allPending=state.tasks.filter(t=>t.list==='pending');
  const counts={};
  diffs.forEach(d=>{counts[d]=d==='All'?allPending.length:allPending.filter(t=>t.diff===d).length;});

  let tasks=allPending;
  if(pendingFilter!=='All') tasks=tasks.filter(t=>t.diff===pendingFilter);
  if(pendingSearch) tasks=tasks.filter(t=>t.title.toLowerCase().includes(pendingSearch.toLowerCase()));

  const pillsHTML=diffs.map(d=>
    `<span class="pill${pendingFilter===d?' active-pill':''}" onclick="setPendingFilter('${d}')">${d} <strong>${counts[d]}</strong></span>`
  ).join('');

  let html=`
<div class="search-row">
  <input class="search-input" type="text" placeholder="Search tasks..." value="${escHtml(pendingSearch)}" oninput="pendingSearch=this.value;reRender()"/>
  <select class="filter-select" onchange="setPendingFilter(this.value)">
    ${diffs.map(d=>`<option value="${d}"${pendingFilter===d?' selected':''}>${d}</option>`).join('')}
  </select>
</div>
<div class="pills-row">${pillsHTML}</div>`;

  if(!tasks.length){
    html+=`<div style="text-align:center;color:var(--muted);padding:40px 0;font-size:14px">No pending tasks found.</div>`;
  } else {
    tasks.forEach(t=>{
      const isDone=t.status==='done';
      if(isDone){
        html+=taskItemHTML(t,`
          <button class="act-btn" onclick="setStatus(${t.id},'todo',event)">
            <span class="material-symbols-outlined" style="font-size:13px">replay</span> Undo
          </button>
          <button class="del-btn" onclick="deleteTask(${t.id},event)">
            <span class="material-symbols-outlined" style="font-size:14px">delete</span>
          </button>`);
      } else {
        const startBtn=t.status!=='inprogress'
          ?`<button class="act-btn" onclick="setStatus(${t.id},'inprogress',event)"><span class="material-symbols-outlined" style="font-size:13px">play_arrow</span> Start</button>`
          :`<button class="act-btn primary" onclick="setStatus(${t.id},'done',event)"><span class="material-symbols-outlined" style="font-size:13px">check</span> Done</button>`;
        html+=taskItemHTML(t,`
          ${startBtn}
          <button class="act-btn" onclick="moveTask(${t.id},'today',event)">
            <span class="material-symbols-outlined" style="font-size:13px">today</span> Today
          </button>
          <button class="del-btn" onclick="deleteTask(${t.id},event)">
            <span class="material-symbols-outlined" style="font-size:14px">delete</span>
          </button>`);
      }
    });
  }
  return html;
}

      <button class="act-btn" onclick="setStatus(${t.id},'todo',event)"><span class="material-symbols-outlined" style="font-size:12px">replay</span> Reset</button>`
    :`
      <button class="act-btn" onclick="setStatus(${t.id},'todo',event)"><span class="material-symbols-outlined" style="font-size:12px">replay</span> Reopen</button>`}
  </div>
</div>`;
  }

  const empty=`<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px 0">No tasks</div>`;
  return `
<div class="kanban-filter">${filterHTML}</div>
<div class="kanban-board" id="kanban-board">
  <div class="kanban-col" data-droptarget="todo">
    <div class="kanban-col-header">
      <span class="kanban-col-title">To Do</span>
      <span class="kanban-count" style="background:#e2dfff;color:#3525cd">${todo.length}</span>
    </div>
    ${todo.length?todo.map(kCard).join(''):empty}
  </div>
  <div class="kanban-col" data-droptarget="inprogress">
    <div class="kanban-col-header">
      <span class="kanban-col-title">In Progress</span>
      <span class="kanban-count" style="background:#fff8ee;color:#684000">${inprog.length}</span>
    </div>
    ${inprog.length?inprog.map(kCard).join(''):empty}
  </div>
  <div class="kanban-col" data-droptarget="done">
    <div class="kanban-col-header">
      <span class="kanban-col-title">Done</span>
      <span class="kanban-count" style="background:#e8fdf4;color:#006c49">${done.length}</span>
    </div>
    ${done.length?done.map(kCard).join(''):empty}
  </div>
</div>`;
}

function initKanbanDrag() {
  let dragging=null,clone=null,startX=0,startY=0,origCol=null;

  function getColUnder(x,y){
    const cols=document.querySelectorAll('[data-droptarget]');
    for(const col of cols){
      const r=col.getBoundingClientRect();
      if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom) return col;
    }
    return null;
  }
  function clearHighlight(){document.querySelectorAll('.kanban-col').forEach(c=>c.classList.remove('drag-over'));}

  document.querySelectorAll('.kanban-task').forEach(card=>{
    card.addEventListener('pointerdown',e=>{
      if(e.target.closest('button')) return;
      e.preventDefault();
      dragging=card;
      origCol=card.closest('[data-droptarget]');
      startX=e.clientX;startY=e.clientY;
      clone=card.cloneNode(true);
      const r=card.getBoundingClientRect();
      clone.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;opacity:0.9;z-index:9999;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.2);transform:rotate(1.5deg);`;
      document.body.appendChild(clone);
      card.style.opacity='0.3';
      card.setPointerCapture(e.pointerId);
    });
    card.addEventListener('pointermove',e=>{
      if(!dragging||dragging!==card) return;
      const dx=e.clientX-startX,dy=e.clientY-startY;
      const r=card.getBoundingClientRect();
      clone.style.left=(r.left+dx-(e.clientX-startX-(e.clientX-r.left-r.width/2))*0)+'px';
      clone.style.left=(parseFloat(clone.style.left)||r.left)+'px';
      clone.style.left=`${e.clientX-r.width/2}px`;
      clone.style.top=`${e.clientY-30}px`;
      clearHighlight();
      const col=getColUnder(e.clientX,e.clientY);
      if(col) col.classList.add('drag-over');
    });
    card.addEventListener('pointerup',e=>{
      if(!dragging||dragging!==card) return;
      const col=getColUnder(e.clientX,e.clientY);
      if(col&&col!==origCol){
        const newStatus=col.getAttribute('data-droptarget');
        const id=parseInt(card.getAttribute('data-id'));
        setStatus(id,newStatus,null);
      } else {
        card.style.opacity='';
      }
      clearHighlight();
      if(clone){clone.remove();clone=null;}
      dragging=null;
    });
    card.addEventListener('pointercancel',()=>{
      if(dragging===card) card.style.opacity='';
      clearHighlight();
      if(clone){clone.remove();clone=null;}
      dragging=null;
    });
  });
}

load();
initThemeIcon();
renderTab('today');
if(promotedCount>0) showToast(`${promotedCount} task${promotedCount>1?'s':''} moved to today`);

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
